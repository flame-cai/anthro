name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch — prevents duplicate artifact uploads
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Tests — Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      - run: node test/anthro.test.js

  # ── 2. Build + upload Pages artifact (runs ONCE, not in matrix) ─────────────
  build:
    name: Build GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    # Only on pushes to main (not on PRs, not on tags)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Bundle library
        run: |
          esbuild src/anthro.js \
            --bundle --format=iife --global-name=anthro \
            --outfile=docs/anthro.bundle.js --minify

      - name: Copy WHO tables to docs/data
        run: mkdir -p docs/data && cp data/*.json docs/data/

      # Upload exactly once — this is the only job that calls upload-pages-artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  # ── 3. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → flame-cai.github.io/anthro
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

  # ── 4. Publish to npm (only on version tags, e.g. v2.1.0) ──────────────────
