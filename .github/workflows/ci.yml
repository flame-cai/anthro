name: CI / CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Cancels any in-progress run for the same branch.
# Prevents duplicate artifact uploads which cause the deploy job to fail.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force all actions onto Node.js 24.
# actions/upload-pages-artifact@v3 internally uses upload-artifact@v4 which
# defaults to Node 20. This env var overrides it. The resulting warning
# "being forced to run on Node.js 24" is expected and harmless.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24' }
      - run: node test/anthro.test.js

  deploy:
    name: Build and deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    # Only on direct pushes to main, not on pull requests or tags.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24' }

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Build site
        run: |
          esbuild src/anthro.js \
            --bundle --format=iife --global-name=anthro \
            --outfile=docs/anthro.bundle.js --minify
          mkdir -p docs/data
          cp data/*.json docs/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - id: deploy
        uses: actions/deploy-pages@v4

  # Only runs when a version tag is pushed (e.g. git tag v1.0.0 && git push origin v1.0.0).
  # Requires NPM_TOKEN secret in repo Settings -> Secrets -> Actions.
  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
