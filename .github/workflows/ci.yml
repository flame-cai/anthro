name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancels any in-progress run for the same branch, preventing duplicate
# artifact uploads which would cause the deploy job to fail.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force all actions to run on Node.js 24.
# actions/upload-pages-artifact@v3 uses upload-artifact@v4 internally, which
# still targets Node 20 by default. This env var overrides that. The resulting
# "being forced to run on Node.js 24" warning is expected and harmless.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24' }
      - run: node test/anthro.test.js

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    # Only runs on direct pushes to main — not on pull requests, not on tags.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24' }

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Build
        run: |
          mkdir -p docs/data
          esbuild src/anthro.js \
            --bundle --format=iife --global-name=anthro \
            --outfile=docs/anthro.bundle.js --minify
          cp data/*.json docs/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

  # This job only runs when a version tag (e.g. v1.0.0) is pushed.
  # A push to main triggers test + deploy, but NOT publish.
  # To publish a new version:
  #   git tag v1.0.0
  #   git push origin v1.0.0
  # Also requires the NPM_TOKEN secret to be set in repo Settings → Secrets.
  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
