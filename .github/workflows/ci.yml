name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run at a time per branch — prevents duplicate artifact uploads
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24' }
      - run: node test/anthro.test.js

  # ── 2. Build + upload Pages artifact ────────────────────────────────────────
  build:
    name: Build GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24' }
      - run: npm install -g esbuild
      - name: Bundle
        run: |
          esbuild src/anthro.js \
            --bundle --format=iife --global-name=anthro \
            --outfile=docs/anthro.bundle.js --minify
      - name: Copy tables
        run: mkdir -p docs/data && cp data/*.json docs/data/
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs/ }

  # ── 3. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → flame-cai.github.io/anthro
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

